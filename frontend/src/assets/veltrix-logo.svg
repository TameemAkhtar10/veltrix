<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-radial" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a0535"/>
      <stop offset="60%" stop-color="#0a0118"/>
      <stop offset="100%" stop-color="#040008"/>
    </radialGradient>

    <radialGradient id="orb-core" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#f0e6ff"/>
      <stop offset="25%" stop-color="#c084fc"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="80%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e0345"/>
    </radialGradient>

    <radialGradient id="orb-gloss" cx="35%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#e9d5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="v-face-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="30%" stop-color="#c084fc"/>
      <stop offset="70%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>

    <linearGradient id="v-face-right" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="40%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#1e0345"/>
    </linearGradient>

    <linearGradient id="v-inner-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>

    <linearGradient id="v-inner-right" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#0f0220"/>
    </linearGradient>

    <linearGradient id="rim-top-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c084fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="rim-top-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0.7"/>
    </linearGradient>

    <linearGradient id="node-grad" cx="35%" cy="30%" r="60%" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="40%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.7"/>
    </linearGradient>

    <filter id="outer-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="node-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="tip-bloom" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="8" result="g1"/>
      <feGaussianBlur stdDeviation="3" result="g2" in="SourceGraphic"/>
      <feMerge><feMergeNode in="g1"/><feMergeNode in="g2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="text-glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="4" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="circuit-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="orb-clip">
      <circle cx="300" cy="252" r="195"/>
    </clipPath>
  </defs>

  <rect width="600" height="600" fill="#050009"/>
  <rect width="600" height="600" fill="url(#bg-radial)"/>

  <circle cx="300" cy="252" r="220" fill="#1a0535" opacity="0.6" filter="url(#outer-glow)"/>

  <circle cx="300" cy="252" r="195" fill="url(#orb-core)"/>

  <g clip-path="url(#orb-clip)">
    <ellipse cx="248" cy="190" rx="130" ry="85" fill="url(#orb-gloss)" opacity="0.9"/>
  </g>

  <circle cx="300" cy="252" r="195" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <circle cx="300" cy="252" r="197" fill="none" stroke="#e9d5ff" stroke-width="0.5" opacity="0.2"/>

  <circle cx="300" cy="252" r="215" fill="none" stroke="url(#ring-grad)" stroke-width="0.8" stroke-dasharray="4 8"/>
  <circle cx="300" cy="252" r="228" fill="none" stroke="#7c3aed" stroke-width="0.4" stroke-dasharray="2 14" opacity="0.5"/>

  <g filter="url(#soft-glow)" opacity="0.5">
    <polygon points="178,148 230,148 300,378 370,148 422,148 300,412" fill="#9333ea"/>
  </g>

  <polygon points="178,148 209,148 300,406 300,406 178,148" fill="url(#v-face-left)"/>
  <polygon points="209,148 230,148 300,406" fill="url(#v-inner-left)"/>
  <polygon points="370,148 391,148 300,406" fill="url(#v-inner-right)"/>
  <polygon points="391,148 422,148 300,406" fill="url(#v-face-right)"/>

  <line x1="178" y1="148" x2="230" y2="148" stroke="url(#rim-top-left)" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="148" x2="422" y2="148" stroke="url(#rim-top-right)" stroke-width="3" stroke-linecap="round"/>

  <line x1="178" y1="148" x2="230" y2="148" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="370" y1="148" x2="422" y2="148" stroke="#e9d5ff" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <line x1="209" y1="148" x2="300" y2="406" stroke="#c4b5fd" stroke-width="0.6" opacity="0.35"/>
  <line x1="391" y1="148" x2="300" y2="406" stroke="#a78bfa" stroke-width="0.6" opacity="0.25"/>

  <g filter="url(#circuit-glow)" opacity="0.7">
    <line x1="178" y1="148" x2="140" y2="148" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <line x1="140" y1="148" x2="140" y2="200" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <line x1="140" y1="200" x2="120" y2="200" stroke="#6d28d9" stroke-width="1" opacity="0.5"/>
    <circle cx="140" cy="148" r="2.5" fill="#a855f7"/>
    <circle cx="140" cy="200" r="2" fill="#8b5cf6"/>
    <circle cx="120" cy="200" r="1.5" fill="#7c3aed"/>

    <line x1="178" y1="148" x2="155" y2="125" stroke="#6d28d9" stroke-width="0.8" opacity="0.5"/>
    <line x1="155" y1="125" x2="130" y2="125" stroke="#6d28d9" stroke-width="0.8" opacity="0.5"/>
    <circle cx="155" cy="125" r="1.8" fill="#7c3aed" opacity="0.7"/>

    <line x1="422" y1="148" x2="460" y2="148" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <line x1="460" y1="148" x2="460" y2="210" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <line x1="460" y1="210" x2="480" y2="210" stroke="#6d28d9" stroke-width="1" opacity="0.5"/>
    <circle cx="460" cy="148" r="2.5" fill="#a855f7"/>
    <circle cx="460" cy="210" r="2" fill="#8b5cf6"/>
    <circle cx="480" cy="210" r="1.5" fill="#7c3aed"/>

    <line x1="422" y1="148" x2="445" y2="122" stroke="#6d28d9" stroke-width="0.8" opacity="0.5"/>
    <line x1="445" y1="122" x2="470" y2="122" stroke="#6d28d9" stroke-width="0.8" opacity="0.5"/>
    <circle cx="445" cy="122" r="1.8" fill="#7c3aed" opacity="0.7"/>

    <line x1="238" y1="200" x2="210" y2="220" stroke="#6d28d9" stroke-width="0.7" opacity="0.5"/>
    <line x1="210" y1="220" x2="192" y2="220" stroke="#6d28d9" stroke-width="0.7" opacity="0.5"/>
    <circle cx="238" cy="200" r="1.5" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="210" cy="220" r="1.5" fill="#7c3aed" opacity="0.6"/>

    <line x1="362" y1="200" x2="390" y2="222" stroke="#6d28d9" stroke-width="0.7" opacity="0.5"/>
    <line x1="390" y1="222" x2="408" y2="222" stroke="#6d28d9" stroke-width="0.7" opacity="0.5"/>
    <circle cx="362" cy="200" r="1.5" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="390" cy="222" r="1.5" fill="#7c3aed" opacity="0.6"/>

    <line x1="263" y1="272" x2="220" y2="280" stroke="#5b21b6" stroke-width="0.7" opacity="0.45"/>
    <line x1="220" y1="280" x2="200" y2="260" stroke="#5b21b6" stroke-width="0.7" opacity="0.45"/>
    <circle cx="263" cy="272" r="1.5" fill="#7c3aed" opacity="0.5"/>

    <line x1="337" y1="272" x2="380" y2="280" stroke="#5b21b6" stroke-width="0.7" opacity="0.45"/>
    <line x1="380" y1="280" x2="400" y2="260" stroke="#5b21b6" stroke-width="0.7" opacity="0.45"/>
    <circle cx="337" cy="272" r="1.5" fill="#7c3aed" opacity="0.5"/>
  </g>

  <g filter="url(#node-glow)">
    <circle cx="178" cy="148" r="6" fill="#1a0535" stroke="#c084fc" stroke-width="1.5"/>
    <circle cx="178" cy="148" r="3" fill="#e9d5ff"/>

    <circle cx="422" cy="148" r="6" fill="#1a0535" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="422" cy="148" r="3" fill="#c4b5fd"/>

    <circle cx="209" cy="148" r="4" fill="#1a0535" stroke="#9333ea" stroke-width="1.2"/>
    <circle cx="209" cy="148" r="2" fill="#c084fc"/>

    <circle cx="391" cy="148" r="4" fill="#1a0535" stroke="#7c3aed" stroke-width="1.2"/>
    <circle cx="391" cy="148" r="2" fill="#a78bfa"/>
  </g>

  <g filter="url(#tip-bloom)">
    <circle cx="300" cy="406" r="9" fill="#7c3aed" opacity="0.4"/>
    <circle cx="300" cy="406" r="5.5" fill="#1a0535" stroke="#c084fc" stroke-width="1.5"/>
    <circle cx="300" cy="406" r="3" fill="#e9d5ff"/>
    <circle cx="300" cy="406" r="1.5" fill="#ffffff"/>
  </g>

  <ellipse cx="255" cy="175" rx="18" ry="8" fill="#ffffff" opacity="0.06" transform="rotate(-20 255 175)"/>
  <ellipse cx="348" cy="168" rx="12" ry="5" fill="#e9d5ff" opacity="0.05" transform="rotate(15 348 168)"/>

  <g filter="url(#text-glow)">
    <text
      x="300"
      y="510"
      text-anchor="middle"
      font-family="'Courier New', 'Lucida Console', monospace"
      font-size="54"
      font-weight="700"
      letter-spacing="18"
      fill="url(#text-grad)"
    >VELTRIX</text>
  </g>

  <text
    x="300"
    y="548"
    text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="11"
    font-weight="400"
    letter-spacing="10"
    fill="#7c3aed"
    opacity="0.75"
  >AI INTELLIGENCE</text>

  <line x1="142" y1="525" x2="220" y2="525" stroke="#4c1d95" stroke-width="0.6" opacity="0.6"/>
  <line x1="380" y1="525" x2="458" y2="525" stroke="#4c1d95" stroke-width="0.6" opacity="0.6"/>
  <circle cx="142" cy="525" r="1.5" fill="#7c3aed" opacity="0.6"/>
  <circle cx="458" cy="525" r="1.5" fill="#7c3aed" opacity="0.6"/>
</svg>
