  <line x1="142" y1="42" x2="100" y2="158" stroke="#d8d8d5" stroke-width="0.7" opacity="0.3"/>

  <line x1="36" y1="42" x2="80" y2="42" stroke="url(#rimL)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="42" x2="164" y2="42" stroke="url(#rimR)" stroke-width="2.5" stroke-linecap="round"/>

  <line x1="36" y1="42" x2="80" y2="42" stroke="#ffdca2" stroke-width="0.8" opacity="0.62" stroke-linecap="round"/>
  <line x1="120" y1="42" x2="164" y2="42" stroke="#d0d0cd" stroke-width="0.8" opacity="0.52" stroke-linecap="round"/>

  <circle cx="100" cy="158" r="5" fill="#f5a623" opacity="0.4" filter="url(#tipglow)"/>
  <circle cx="100" cy="158" r="2.5" fill="#ffe0ad"/>
  <circle cx="100" cy="158" r="1.2" fill="#ffffff"/>

  <circle cx="100" cy="14" r="2" fill="#f5a623" opacity="0.8"/>
  <circle cx="174" cy="57" r="2" fill="#f5a623" opacity="0.62"/>
  <circle cx="174" cy="143" r="2" fill="#8f8f8b" opacity="0.62"/>
  <circle cx="100" cy="186" r="2" fill="#f5a623" opacity="0.8"/>
  <circle cx="26" cy="143" r="2" fill="#8f8f8b" opacity="0.62"/>
  <circle cx="26" cy="57" r="2" fill="#f5a623" opacity="0.62"/>

  <circle cx="48" cy="88" r="1.2" fill="#c8c8c4" opacity="0.45"/>
  <circle cx="44" cy="116" r="0.8" fill="#f5a623" opacity="0.5"/>
  <circle cx="155" cy="80" r="1" fill="#f5a623" opacity="0.4"/>
  <circle cx="152" cy="118" r="0.8" fill="#8f8f8b" opacity="0.45"/>
