<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1f1f1f"/>
    </linearGradient>
    <linearGradient id="hexborder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#e58f12" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="vlo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#d98711"/>
    </linearGradient>
    <linearGradient id="vli" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0d0cd"/>
      <stop offset="100%" stop-color="#9e9e9a"/>
    </linearGradient>
    <linearGradient id="vri" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5b5b1"/>
      <stop offset="100%" stop-color="#7e7e7a"/>
    </linearGradient>
    <linearGradient id="vro" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#b7710e"/>
    </linearGradient>
    <linearGradient id="rimL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd58b" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="rimR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cfcfcb" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tipglow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hexglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="100,14 174,57 174,143 100,186 26,143 26,57" fill="url(#hexbg)"/>

  <polygon points="100,14 174,57 174,143 100,186 26,143 26,57" fill="none" stroke="#f5a623" stroke-width="4" opacity="0.24" filter="url(#hexglow)"/>
  <polygon points="100,14 174,57 174,143 100,186 26,143 26,57" fill="none" stroke="url(#hexborder)" stroke-width="1.2"/>

  <polygon points="100,22 167,62 167,138 100,178 33,138 33,62" fill="none" stroke="#f5a623" stroke-width="0.5" opacity="0.22"/>

  <g opacity="0.55" filter="url(#bloom)">
    <polygon points="36,42 80,42 100,158" fill="#f5a623"/>
    <polygon points="120,42 164,42 100,158" fill="#8a8a86"/>
  </g>

  <polygon points="36,42 58,42 100,158" fill="url(#vlo)"/>
  <polygon points="58,42 80,42 100,158" fill="url(#vli)"/>
  <polygon points="120,42 142,42 100,158" fill="url(#vri)"/>
  <polygon points="142,42 164,42 100,158" fill="url(#vro)"/>

