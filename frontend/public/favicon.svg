  <circle cx="128" cy="172" r="1" fill="#f5a623" opacity="0.4"/>
  <circle cx="86" cy="28" r="0.8" fill="#d0d0cd" opacity="0.4"/>
  <circle cx="114" cy="28" r="0.8" fill="#d0d0cd" opacity="0.4"/>

  <line x1="26" y1="57" x2="36" y2="63" stroke="#f5a623" stroke-width="0.8" opacity="0.5"/>
  <line x1="174" y1="57" x2="164" y2="63" stroke="#f5a623" stroke-width="0.8" opacity="0.5"/>
  <line x1="26" y1="143" x2="36" y2="137" stroke="#8f8f8b" stroke-width="0.8" opacity="0.4"/>
  <line x1="174" y1="143" x2="164" y2="137" stroke="#8f8f8b" stroke-width="0.8" opacity="0.4"/>
